name: PINN Simulation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Smoke test (short training)
      run: |
        python -c "
        from src.train import train_pinn
        model = train_pinn(epochs=50, lr=1e-3, u_max=1.0, D=0.01, k=1.5)
        print('[CI] Smoke test passed: model trained for 50 epochs.')
        "
